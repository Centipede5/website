<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/png" href="{{ '/assets/images/chip.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <!-- Microsoft Clarity Tracking -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vx7tu7jfb8");
    </script>
  </head>
  <body class="{{ page.body_class }}">
    <canvas id="bg-canvas"></canvas>
    {% include header.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}

    <!-- Chat Modal -->
    <div class="modal fade" id="chatModal" tabindex="-1" aria-labelledby="chatModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
        <div class="modal-content chat-modal-content">
          <div class="modal-header border-bottom-0 pb-0">
            <h5 class="modal-title d-flex align-items-center gap-2" id="chatModalLabel">
              <i class="fa-solid fa-sparkles text-accent"></i> 
              <span class="text-accent">Calvin's AI Assistant</span>
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body chat-messages-container" id="chatMessages">
            <div class="chat-message bot-message">
              <div class="message-bubble greeting-bubble">
                Hi! Ask me anything about Calvin's projects, experience, or skills.
              </div>
            </div>
          </div>
          <div class="modal-footer border-top-0 pt-0">
            <div class="chat-input-wrapper w-100 position-relative">
              <input type="text" id="modalChatInput" class="form-control chat-input" placeholder="Type your question..." autocomplete="off">
              <button id="modalChatSubmit" class="btn text-accent chat-submit-btn position-absolute top-50 end-0 translate-middle-y py-0" aria-label="Send">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/context.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/chat.js' | relative_url }}"></script>
  </body>
</html>
