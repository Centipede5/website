- title: BlimpServe
  image:
    src: /assets/images/blimp_app.png
    alt: BlimpServe application interface
  description:
    - I co-designed a proprietary medicine-transport airship drone to address supply chain issues in underserved and hard-to-reach locations.
    - *BlimpServe* avoids the infrastructure requirements of roads and airports while using lightweight solar panels to extend range and improve efficiency.
    - The system also tackled cold-chain transport by using low ambient temperatures at altitude together with abundant solar energy.
    - A 10-DOF flight controller and vectored thrust propeller controlled the craft, while the flight-path planner used NOAA wind-current data, A* search, and gradient-descent path smoothing.
- title: Rocket.js
  image:
    src: /assets/images/rocketjs.png
    alt: Rocket.js simulator visualization
  links:
    - label: View launch image
      url: https://media.discordapp.net/attachments/445554232637128716/1193382749176873010/image.png
  description:
    - I built a high-performance rocket flight simulator for multi-stage, clustered, and air-launched model rockets using thrust data from thrustcurve.org.
    - The simulator uses the Euler-Cromer method and a configurable time step so users can trade accuracy for performance.
    - It was initially developed to support the design of a balloon-launched rocket that was successfully launched in 2020.
    - Validation against real-world flights showed an average error of **less than 5%**.
- title: Scout Infinity
  image:
    src: /assets/images/scout_works.png
    alt: Scout Infinity concept diagram
  links:
    - label: Learn more
      url: https://centipede5.github.io/scout_infinity/
  description:
    - I co-designed an augmented smartphone case using Internet of Things technology to improve the mobile experience and democratize long-range communication.
    - The *Infinity* case connects phones to the LoRaWAN low-power wide-area network over Bluetooth Low Energy.
    - Lost devices can be geolocated by combining the phone's last GPS data with the case's own LPWAN triangulation and six-degree-of-freedom sensor data.
    - Ultra-low-power components and passive NFC charging help the device operate without adding daily charging friction.
