- title: .IO Style Web Games
  description:
    - I created, developed, and launched 14 browser games, including *Shotwars.io*, *Glork.io*, and *MineParkour.club*, generating more than $15,000 in total revenue.
    - The stack combined HTML5, CSS, JavaScript, and Node.js with a custom game engine built on p2 physics, the Canvas API, and WebSockets for multiplayer support.
    - The 3D titles used Three.js together with a custom physics engine built for capsule movement on convex surfaces.
    - Distribution partnerships with AddictingGames.com, Iogames.space, CrazyGames, GameDistribution, and Titotu drove more than **3 million total plays**.
